<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SYNTH DASHBOARD | Memphis Design Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web@2.0.3"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'pop-pink': '#FF1493',
            'electric-cyan': '#00FFFF',
            'lemon-yellow': '#FFF500',
            'pitch-black': '#000000',
          },
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
            display: ['Syne', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      margin: 0;
    }
    .polka-dots {
      background-image: radial-gradient(circle, currentColor 2px, transparent 2px);
      background-size: 12px 12px;
    }
    .wavy-lines {
      background-image: repeating-linear-gradient(45deg, transparent, transparent 8px, currentColor 8px, currentColor 10px);
    }
    .shadow-brutal { box-shadow: 4px 4px 0px 0px #000000; }
    .shadow-brutal-pink { box-shadow: 6px 6px 0px 0px #FF1493; }
    .shadow-brutal-cyan { box-shadow: 6px 6px 0px 0px #00FFFF; }
    .shadow-brutal-yellow { box-shadow: 6px 6px 0px 0px #FFF500; }
    .border-brutal { border: 3px solid #000000; }
    .border-brutal-thick { border: 4px solid #000000; }
    .border-3 { border-width: 3px; }
    .synth-panel {
      background: #ffffff;
      border: 3px solid #000000;
      box-shadow: 6px 6px 0px 0px #000000;
    }
    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track {
      background: #000000;
      border-left: 3px solid #000000;
    }
    ::-webkit-scrollbar-thumb {
      background: #FF1493;
      border: 3px solid #000000;
    }
    ::-webkit-scrollbar-thumb:hover { background: #00FFFF; }
    ::selection {
      background: #FF1493;
      color: #ffffff;
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .animate-marquee { animation: marquee 20s linear infinite; }
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes rotate-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes scanline {
      0% { top: 0%; }
      100% { top: 100%; }
    }
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.95; }
    }
    @keyframes slide-in-left {
      from { transform: translateX(-100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slide-in-up {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes scale-in {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes waveform {
      0% { d: path('M0,150 Q200,50 400,150 T800,150'); }
      50% { d: path('M0,150 Q200,250 400,150 T800,150'); }
      100% { d: path('M0,150 Q200,50 400,150 T800,150'); }
    }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-rotate-slow { animation: rotate-slow 20s linear infinite; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-flicker { animation: flicker 0.5s ease-in-out; }
    .animate-slide-in-left { animation: slide-in-left 0.5s ease-out forwards; }
    .animate-slide-in-up { animation: slide-in-up 0.5s ease-out forwards; }
    .animate-scale-in { animation: scale-in 0.5s ease-out forwards; }
    .knob-container {
      position: relative;
      cursor: grab;
    }
    .knob-container:active { cursor: grabbing; }
    .fader-track {
      position: relative;
      background: #000;
      border: 3px solid #fff;
      border-radius: 9999px;
    }
    .fader-handle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      cursor: grab;
      background: #fff;
      border: 3px solid #000;
    }
    .fader-handle:active { cursor: grabbing; }
    .page-transition {
      animation: slide-in-up 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const { motion, AnimatePresence } = window.Motion;

    // Utility Components
    const DigitalClock = () => {
      const [time, setTime] = useState(new Date().toLocaleTimeString('en-US', { hour12: false }));
      useEffect(() => {
        const interval = setInterval(() => {
          setTime(new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }));
        }, 1000);
        return () => clearInterval(interval);
      }, []);
      return (
        <div className="bg-black border-3 border-[#00FFFF] px-4 py-2 animate-slide-in-left" style={{animationDelay: '0.9s'}}>
          <span className="text-[#00FFFF] font-mono text-lg font-bold">{time}</span>
        </div>
      );
    };

    const SystemStats = () => {
      const [stats, setStats] = useState({ cpu: 45, memory: 62, network: 128 });
      useEffect(() => {
        const interval = setInterval(() => {
          setStats({
            cpu: Math.floor(Math.random() * 30) + 30,
            memory: Math.floor(Math.random() * 20) + 50,
            network: Math.floor(Math.random() * 50) + 100,
          });
        }, 2000);
        return () => clearInterval(interval);
      }, []);
      return (
        <div className="hidden md:flex items-center gap-3 bg-black/40 border-2 border-white/20 px-4 py-2 animate-slide-in-left" style={{animationDelay: '0.85s'}}>
          {[
            { label: "CPU", value: stats.cpu, color: "#FF1493" },
            { label: "MEM", value: stats.memory, color: "#00FFFF" },
            { label: "NET", value: stats.network, color: "#FFF500", unit: "MB/s" },
          ].map((stat) => (
            <div key={stat.label} className="flex items-center gap-2">
              <span className="text-xs font-mono text-white/50">{stat.label}</span>
              <div className="w-16 h-4 bg-black border border-white/30 relative overflow-hidden">
                <div className="h-full transition-all duration-500" style={{ backgroundColor: stat.color, width: `${Math.min(stat.value, 100)}%` }} />
              </div>
              <span className="text-xs font-mono font-bold" style={{ color: stat.color }}>
                {stat.unit ? `${stat.value}` : `${stat.value}%`}
              </span>
            </div>
          ))}
        </div>
      );
    };

    // SynthKnob Component
    const SynthKnob = ({ value: initialValue = 75, min = 0, max = 100, label, color = "#FF1493", size = 70 }) => {
      const [value, setValue] = useState(initialValue);
      const [isDragging, setIsDragging] = useState(false);
      const rotation = ((value - min) / (max - min)) * 270 - 135;
      const percentage = ((value - min) / (max - min)) * 100;

      const handleDrag = (e) => {
        if (!isDragging) return;
        const delta = e.movementY;
        const sensitivity = 0.5;
        setValue(prev => Math.max(min, Math.min(max, prev - delta * sensitivity)));
      };

      useEffect(() => {
        let animationId;
        const animate = () => {
          setValue(prev => {
            const diff = initialValue - prev;
            if (Math.abs(diff) < 0.5) return initialValue;
            return prev + diff * 0.1;
          });
          animationId = requestAnimationFrame(animate);
        };
        animationId = requestAnimationFrame(animate);
        const timer = setTimeout(() => cancelAnimationFrame(animationId), 1200);
        return () => {
          cancelAnimationFrame(animationId);
          clearTimeout(timer);
        };
      }, [initialValue]);

      return (
        <div className="flex flex-col items-center gap-2">
          <div
            className="knob-container"
            style={{ width: size, height: size }}
            onMouseDown={() => setIsDragging(true)}
            onMouseUp={() => setIsDragging(false)}
            onMouseLeave={() => setIsDragging(false)}
            onMouseMove={handleDrag}
          >
            <div className="absolute inset-0 rounded-full border-4 border-black bg-white transition-all"
              style={{ boxShadow: isDragging ? '0px 0px 0px 0px #000000' : '4px 4px 0px 0px #000000', transform: isDragging ? 'translate(4px, 4px)' : 'translate(0, 0)' }}>
            </div>
            <svg className="absolute inset-0" width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
              <circle cx={size/2} cy={size/2} r={size/2-8} fill="none" stroke="#e5e5e5" strokeWidth={6}
                strokeDasharray={`${Math.PI * (size-16) * 0.75} ${Math.PI * (size-16)}`} strokeLinecap="round" />
              <circle cx={size/2} cy={size/2} r={size/2-8} fill="none" stroke={color} strokeWidth={6}
                strokeDasharray={`${Math.PI * (size-16) * 0.75 * (percentage/100)} ${Math.PI * (size-16)}`} strokeLinecap="round" style={{ transform: 'rotate(135deg)', transformOrigin: 'center' }} />
            </svg>
            <div className="absolute inset-2 rounded-full bg-white border-3 border-black flex items-center justify-center"
              style={{ transform: `rotate(${rotation}deg)` }}>
              <div className="absolute top-2 w-1.5 h-3 rounded-full" style={{ backgroundColor: color }} />
            </div>
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-3 h-3 rounded-full border-2 border-black" style={{ backgroundColor: color }} />
            </div>
          </div>
          <span className="text-xs font-bold text-white tracking-wider uppercase">{label}</span>
          <div className="px-2 py-1 bg-black border-2 border-white text-white font-mono text-xs min-w-[50px] text-center transition-all"
            style={{ transform: isDragging ? 'scale(1.1)' : 'scale(1)', borderColor: isDragging ? color : '#ffffff' }}>
            {Math.round(value)}%
          </div>
        </div>
      );
    };

    // SynthFader Component
    const SynthFader = ({ value: initialValue = 72, label, color = "#FF1493", height = 120 }) => {
      const [value, setValue] = useState(0);
      const [isDragging, setIsDragging] = useState(false);
      const [y, setY] = useState(0);
      const trackRef = useRef(null);

      useEffect(() => {
        const targetY = -((initialValue / 100) * (height - 40));
        let currentY = 0;
        const animate = () => {
          const diff = targetY - currentY;
          if (Math.abs(diff) < 0.5) {
            setY(targetY);
            setValue(initialValue);
            return;
          }
          currentY += diff * 0.1;
          setY(currentY);
          setValue(Math.round((-currentY / (height - 40)) * 100));
          requestAnimationFrame(animate);
        };
        const timer = setTimeout(animate, 100);
        return () => clearTimeout(timer);
      }, [initialValue, height]);

      const handleMouseDown = (e) => {
        setIsDragging(true);
        const startY = e.clientY;
        const startPos = y;

        const handleMouseMove = (moveEvent) => {
          const delta = moveEvent.clientY - startY;
          const newY = Math.max(-height + 40, Math.min(0, startPos + delta));
          setY(newY);
          setValue(Math.round((-newY / (height - 40)) * 100));
        };

        const handleMouseUp = () => {
          setIsDragging(false);
          document.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseup', handleMouseUp);
        };

        document.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseup', handleMouseUp);
      };

      const fillHeight = Math.max(10, ((y + height - 40) / (height - 40)) * 100);

      return (
        <div className="flex flex-col items-center gap-3">
          <span className="text-xs font-bold text-white tracking-wider uppercase">{label}</span>
          <div ref={trackRef} className="fader-track w-12 overflow-visible" style={{ height }}>
            <div className="absolute left-0 right-0 top-0 bottom-0 flex flex-col justify-between py-5 px-1">
              {[100, 75, 50, 25, 0].map((mark) => (
                <div key={mark} className="flex items-center gap-1">
                  <div className="w-2 h-0.5 bg-white/50" />
                </div>
              ))}
            </div>
            <div className="absolute bottom-0 left-0 right-0 rounded-b-full transition-all" style={{ backgroundColor: color, height: `${fillHeight}%` }} />
            <div className="fader-handle w-14 h-8 rounded-sm flex items-center justify-center left-1/2 -translate-x-1/2"
              style={{
                bottom: `${fillHeight}%`,
                transform: `translateX(-50%) ${isDragging ? 'translateY(4px) scaleX(1.1)' : ''}`,
                boxShadow: isDragging ? '0px 0px 0px 0px #000000' : '4px 4px 0px 0px #000000'
              }}
              onMouseDown={handleMouseDown}>
              <div className="flex gap-1">
                <div className="w-1 h-4 bg-black rounded-full" />
                <div className="w-1 h-4 bg-black rounded-full" />
                <div className="w-1 h-4 bg-black rounded-full" />
              </div>
              <div className="absolute left-0 top-0 bottom-0 w-1.5" style={{ backgroundColor: color }} />
              <div className="absolute right-0 top-0 bottom-0 w-1.5" style={{ backgroundColor: color }} />
            </div>
          </div>
          <div className="px-3 py-1.5 bg-white border-3 border-black font-mono font-bold text-black text-sm min-w-[60px] text-center transition-all"
            style={{ transform: isDragging ? 'scale(1.1)' : 'scale(1)', backgroundColor: isDragging ? color : '#ffffff' }}>
            {value}
          </div>
        </div>
      );
    };

    // MetricCard Component
    const MetricCard = ({ title, value, color, bgColor, delay }) => {
      const [displayValue, setDisplayValue] = useState("0");
      const numValue = parseInt(value.replace(/[^0-9]/g, ""));
      const prefix = value.replace(/[0-9]/g, "");

      useEffect(() => {
        const timer = setTimeout(() => {
          let start = 0;
          const duration = 1500;
          const startTime = Date.now();
          const animate = () => {
            const elapsed = Date.now() - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 3);
            const current = Math.floor(start + (numValue - start) * easeOut);
            setDisplayValue(prefix + current.toLocaleString());
            if (progress < 1) requestAnimationFrame(animate);
          };
          requestAnimationFrame(animate);
        }, delay * 1000);
        return () => clearTimeout(timer);
      }, [value, delay, numValue, prefix]);

      return (
        <div className={`relative ${bgColor} border-4 border-black p-5 aspect-square flex flex-col justify-between overflow-hidden group cursor-pointer animate-scale-in transition-all hover:scale-[1.02]`}
          style={{ boxShadow: `6px 6px 0px 0px #000000`, animationDelay: `${delay}s` }}
          onMouseEnter={(e) => e.currentTarget.style.boxShadow = `10px 10px 0px 0px ${color}`}
          onMouseLeave={(e) => e.currentTarget.style.boxShadow = `6px 6px 0px 0px #000000`}>
          <div className="absolute inset-0 opacity-10 pointer-events-none polka-dots" style={{ color }} />
          <div className="relative z-10">
            <h3 className="text-xs font-black tracking-wider text-black uppercase">{title}</h3>
          </div>
          <div className="relative z-10">
            <span className="text-4xl md:text-5xl font-black text-black block" style={{ fontFamily: "'Syne', sans-serif" }}>{displayValue}</span>
          </div>
          <div className="absolute bottom-0 left-0 right-0 h-3" style={{ backgroundColor: color }} />
          <div className="absolute top-0 right-0 w-8 h-8 bg-black">
            <div className="absolute bottom-1 left-1 w-2 h-2 rounded-full bg-white" />
          </div>
        </div>
      );
    };

    // ParameterPanel Component
    const ParameterPanel = () => {
      return (
        <section className="p-6 animate-slide-in-up" style={{animationDelay: '0.2s'}}>
          <div className="mb-6 flex items-center gap-4 animate-slide-in-left" style={{animationDelay: '0.3s'}}>
            <div className="w-4 h-4 bg-[#FFF500] border-3 border-black" />
            <h2 className="text-xl font-black tracking-tight text-white uppercase" style={{ fontFamily: "'Syne', sans-serif" }}>Core Parameters</h2>
            <div className="flex-1 h-1 bg-white/20" />
            <span className="text-xs font-mono text-[#00FFFF]">SYS.01</span>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 grid grid-cols-2 gap-4">
              <MetricCard title="Total Users" value="48,592" color="#FF1493" bgColor="bg-white" delay={0.4} />
              <MetricCard title="Revenue" value="$128K" color="#00FFFF" bgColor="bg-[#FFF500]" delay={0.5} />
              <MetricCard title="Active Sessions" value="2,847" color="#FFF500" bgColor="bg-[#00FFFF]" delay={0.6} />
              <MetricCard title="Conversion" value="24.8%" color="#FF1493" bgColor="bg-white" delay={0.7} />
            </div>
            <div className="bg-white border-4 border-black p-6 relative animate-slide-in-up" style={{ boxShadow: '6px 6px 0px 0px #FF1493', animationDelay: '0.5s' }}>
              <div className="flex items-center justify-between mb-6 pb-4 border-b-3 border-black">
                <span className="font-black text-sm tracking-wider text-black">CONTROL MATRIX</span>
                <div className="flex gap-1">
                  <div className="w-3 h-3 rounded-full bg-[#FF1493] border-2 border-black" />
                  <div className="w-3 h-3 rounded-full bg-[#00FFFF] border-2 border-black" />
                </div>
              </div>
              <div className="grid grid-cols-3 gap-4">
                <div className="col-span-3 grid grid-cols-3 gap-2">
                  <SynthKnob value={75} label="Gain" color="#FF1493" size={70} />
                  <SynthKnob value={60} label="Filter" color="#00FFFF" size={70} />
                  <SynthKnob value={85} label="Resonance" color="#FFF500" size={70} />
                </div>
                <div className="col-span-3 h-1 bg-black my-2" />
                <div className="col-span-3 flex justify-around">
                  <SynthFader value={72} label="Master" color="#FF1493" height={120} />
                  <SynthFader value={45} label="Bass" color="#00FFFF" height={120} />
                  <SynthFader value={88} label="Treble" color="#FFF500" height={120} />
                </div>
              </div>
              <div className="mt-4 pt-4 border-t-3 border-black flex justify-between items-center">
                <span className="text-xs font-mono text-black">OUTPUT LEVEL</span>
                <div className="flex gap-1">
                  {[...Array(8)].map((_, i) => (
                    <div key={i} className="w-3 h-6 bg-black border-2 border-black animate-pulse-glow"
                      style={{ backgroundColor: i < 6 ? '#FF1493' : '#000', animationDelay: `${i * 0.1}s` }} />
                  ))}
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    };

    // OscilloscopeChart Component
    const OscilloscopeChart = () => {
      const [time, setTime] = useState(0);
      const [isHovering, setIsHovering] = useState(false);
      const [mouseControl, setMouseControl] = useState({ x: 0.5, y: 0.5 });

      useEffect(() => {
        let animationId;
        const animate = (t) => {
          setTime(t * 0.002);
          animationId = requestAnimationFrame(animate);
        };
        animationId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(animationId);
      }, []);

      const generateWaveform = (offset = 0, freq = 1, amp = 50) => {
        const points = [];
        for (let i = 0; i <= 100; i++) {
          const x = (i / 100) * 800;
          const t = time * freq + offset;
          const y = 150 + Math.sin((i / 100) * Math.PI * 4 + t) * amp +
            Math.sin((i / 100) * Math.PI * 8 + t * 1.5) * (amp * 0.3) +
            Math.sin((i / 100) * Math.PI * 2 + t * 0.5) * (amp * 0.5);
          points.push(`${x},${y}`);
        }
        return `M ${points.join(' L ')}`;
      };

      const frequency = isHovering ? 0.5 + mouseControl.x * 2 : 1;
      const amplitude = isHovering ? 30 + mouseControl.y * 60 : 60;
      const pathD = generateWaveform(0, frequency, amplitude);
      const pathD2 = generateWaveform(1, isHovering ? 0.3 + (1 - mouseControl.x) * 1.5 : 0.7, isHovering ? 20 + (1 - mouseControl.y) * 50 : 40);

      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        setMouseControl({
          x: (e.clientX - rect.left) / rect.width,
          y: (e.clientY - rect.top) / rect.height
        });
        setIsHovering(true);
      };

      return (
        <section className="p-6 animate-slide-in-up" style={{animationDelay: '0.6s'}}>
          <div className="mb-6 flex items-center gap-4 animate-slide-in-left" style={{animationDelay: '0.7s'}}>
            <div className="w-4 h-4 bg-[#FF1493] border-3 border-black" />
            <h2 className="text-xl font-black tracking-tight text-white uppercase" style={{ fontFamily: "'Syne', sans-serif" }}>Waveform Monitor</h2>
            <div className="flex-1 h-1 bg-white/20" />
            <span className="text-xs font-mono text-[#00FFFF]">SCOPE.02</span>
          </div>
          <div className="bg-[#FFF500] border-4 border-black p-4 relative animate-scale-in" style={{ boxShadow: '8px 8px 0px 0px #000000', animationDelay: '0.8s' }}>
            <div className="bg-black p-4 rounded-sm relative overflow-hidden">
              <div className="absolute inset-0 opacity-20">
                {[...Array(10)].map((_, i) => (
                  <div key={`h-${i}`} className="absolute w-full h-px bg-[#00FFFF]" style={{ top: `${(i + 1) * 10}%` }} />
                ))}
                {[...Array(20)].map((_, i) => (
                  <div key={`v-${i}`} className="absolute h-full w-px bg-[#00FFFF]" style={{ left: `${(i + 1) * 5}%` }} />
                ))}
              </div>
              <div className="absolute inset-0 pointer-events-none">
                <div className="absolute top-1/2 left-0 w-full h-0.5 bg-[#FF1493]/50" />
                <div className="absolute left-1/2 top-0 h-full w-0.5 bg-[#FF1493]/50" />
              </div>
              <svg viewBox="0 0 800 300" className="w-full h-[300px] relative z-10 cursor-crosshair"
                onMouseMove={handleMouseMove} onMouseLeave={() => setIsHovering(false)}>
                <defs>
                  <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stopColor="#FF1493" />
                    <stop offset="50%" stopColor="#00FFFF" />
                    <stop offset="100%" stopColor="#FFF500" />
                  </linearGradient>
                </defs>
                <path d={pathD2} fill="none" stroke="#00FFFF" strokeWidth={2} opacity={0.5} />

            </SettingSection>
          </div>
          <div className="bg-[#1a1a2e] border-4 border-white p-6 relative animate-slide-in-up" style={{animationDelay: '0.5s'}}>
            <div className="flex items-center gap-3 mb-6">
              <div className="w-10 h-10 bg-[#FF1493] border-3 border-black flex items-center justify-center">
                <i className="ph ph-database text-white text-xl"></i>
              </div>
              <div>
                <h3 className="text-lg font-black text-white uppercase" style={{ fontFamily: "'Syne', sans-serif" }}>Data Management</h3>
                <p className="text-xs text-white/60">Export or delete your account data</p>
              </div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
              <button className="p-4 bg-white border-3 border-black text-left hover:bg-[#00FFFF] transition-colors hover:scale-[1.02]">
                <div className="font-bold text-black uppercase mb-1">Export Data</div>
                <div className="text-xs text-black/60">Download JSON archive</div>
              </button>
              <button className="p-4 bg-white border-3 border-black text-left hover:bg-[#00FFFF] transition-colors hover:scale-[1.02]">
                <div className="font-bold text-black uppercase mb-1">Backup</div>
                <div className="text-xs text-black/60">Create manual backup</div>
              </button>
              <button className="p-4 bg-[#FF1493] border-3 border-black text-left hover:scale-[1.02] transition-transform">
                <div className="font-bold text-white uppercase mb-1">Delete Account</div>
                <div className="text-xs text-white/60">⚠️ Cannot be undone</div>
              </button>
            </div>
            <div className="absolute -top-2 -right-2 w-6 h-6 bg-[#FFF500] border-3 border-black" />
          </div>
        </div>
      );
    };

    // Main App
    const App = () => {
      const [activePage, setActivePage] = useState("dashboard");
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 500);
        return () => clearTimeout(timer);
      }, []);

      const pageTitles = {
        dashboard: { title: "Command Center", subtitle: "v2.0.4" },
        analytics: { title: "Analytics Hub", subtitle: "Real-time Data" },
        users: { title: "User Management", subtitle: "1,247 Users" },
        reports: { title: "Reports Center", subtitle: "48 Reports" },
        settings: { title: "System Settings", subtitle: "Configuration" },
      };

      const currentTitle = pageTitles[activePage] || pageTitles.dashboard;

      const renderPageContent = () => {
        switch (activePage) {
          case "dashboard": return <DashboardView />;
          case "analytics": return <AnalyticsPanel />;
          case "users": return <UsersPanel />;
          case "reports": return <ReportsPanel />;
          case "settings": return <SettingsPanel />;
          default: return <DashboardView />;
        }
      };

      if (loading) {
        return <div className="fixed inset-0 bg-black flex items-center justify-center"><div className="text-[#00FFFF] font-mono text-2xl animate-pulse">INITIALIZING...</div></div>;
      }

      return (
        <div className="min-h-screen bg-black">
          <div className="fixed inset-0 bg-black z-[100] pointer-events-none animate-fade-out" style={{animation: 'fadeOut 0.5s ease-out 0.3s forwards'}} />
          <style>{`@keyframes fadeOut { to { opacity: 0; } } @keyframes slideInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }`}</style>

          <SynthSidebar activeItem={activePage} onItemClick={setActivePage} />

          <main className="ml-[250px] min-h-screen bg-black relative overflow-hidden">
            <div className="absolute inset-0 opacity-5 pointer-events-none">
              <div className="w-full h-full" style={{
                backgroundImage: `linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px)`,
                backgroundSize: "50px 50px"
              }} />
            </div>

            <div className="absolute top-32 right-10 pointer-events-none">
              <div className="w-20 h-20 border-4 border-[#FF1493] rotate-45 animate-rotate-slow" />
            </div>
            <div className="absolute bottom-20 right-20 pointer-events-none">
              <div className="w-16 h-16 bg-[#FFF500] rounded-full border-4 border-black animate-float" />
            </div>
            <div className="absolute top-1/2 right-5 pointer-events-none">
              <div className="w-4 h-32 bg-[#00FFFF] border-2 border-black animate-pulse-glow" />
            </div>

            <header className="p-6 border-b-4 border-white/10 bg-black animate-flicker">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <div className="w-10 h-10 bg-[#FF1493] border-2 border-white flex items-center justify-center animate-scale-in" style={{animationDelay: '0.5s'}}>
                    <span className="text-white font-black text-lg">◈</span>
                  </div>
                  <div>
                    <h1 key={currentTitle.title} className="text-xl font-black text-white uppercase tracking-tight animate-slide-in-down" style={{ fontFamily: "'Syne', sans-serif", animation: 'slideInDown 0.3s ease-out' }}>{currentTitle.title}</h1>
                    <p key={currentTitle.subtitle} className="text-white/40 text-xs font-mono">{currentTitle.subtitle}</p>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <DigitalClock />
                  <div className="flex gap-2">
                    {["#FF1493", "#00FFFF", "#FFF500"].map((color, i) => (
                      <div key={i} className="w-3 h-3 border border-white animate-scale-in" style={{ backgroundColor: color, animationDelay: `${0.8 + i * 0.1}s` }} />
                    ))}
                  </div>
                </div>
              </div>
            </header>

            <div key={activePage} className="relative z-10">
              {renderPageContent()}
            </div>

            <footer className="p-6 border-t-4 border-white/10 mt-8 animate-slide-in-up" style={{animationDelay: '2s'}}>
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-4">
                  <span className="text-white/40 text-xs font-mono">MEMPHIS DESIGN SYSTEM // ANALOG SYNTH CONSOLE</span>
                </div>
                <div className="flex items-center gap-4">
                  <div className="flex items-center gap-2 animate-pulse-glow">
                    <div className="w-2 h-2 bg-[#00FFFF] rounded-full" />
                    <span className="text-[#00FFFF] text-xs font-mono">ONLINE</span>
                  </div>
                  <span className="text-white/40 text-xs font-mono">PING: 12ms</span>
                </div>
              </div>
            </footer>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

    function useScrollReveal(threshold = 0.2) {
      const ref = useRef(null);
      const [isRevealed, setIsRevealed] = useState(false);
      useEffect(() => {
        const element = ref.current;
        if (!element) return;
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsRevealed(true);
              observer.unobserve(element);
            }
          },
          { threshold, rootMargin: '0px 0px -50px 0px' }
        );
        observer.observe(element);
        return () => observer.disconnect();
      }, [threshold]);
      return { ref, isRevealed };
    }

    // TextPressure Component
    function TextPressure({ text = 'DEV.ENGINEER', fontSize = 28, className = '' }) {
      const containerRef = useRef(null);
      const [mouseX, setMouseX] = useState(null);
      const letterRefs = useRef([]);

      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!containerRef.current) return;
          const rect = containerRef.current.getBoundingClientRect();
          setMouseX(e.clientX - rect.left);
        };
        const handleMouseLeave = () => setMouseX(null);
        const container = containerRef.current;
        if (container) {
          container.addEventListener('mousemove', handleMouseMove);
          container.addEventListener('mouseleave', handleMouseLeave);
        }
        return () => {
          if (container) {
            container.removeEventListener('mousemove', handleMouseMove);
            container.removeEventListener('mouseleave', handleMouseLeave);
          }
        };
      }, []);

      const getLetterStyle = (index) => {
        if (mouseX === null || !letterRefs.current[index] || !containerRef.current) {
          return { transform: 'scaleY(1) scaleX(1)', transition: 'transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)' };
        }
        const letter = letterRefs.current[index];
        const letterRect = letter.getBoundingClientRect();
        const containerRect = containerRef.current.getBoundingClientRect();
        const letterCenter = letterRect.left - containerRect.left + letterRect.width / 2;
        const distance = Math.abs(mouseX - letterCenter);
        const maxDistance = 150;
        let pressure = 0;
        if (distance < maxDistance) {
          pressure = 1 - distance / maxDistance;
        }
        const scaleY = 1 - pressure * 0.4;
        const scaleX = 1 + pressure * 0.2;
        return { transform: `scaleY(${scaleY}) scaleX(${scaleX})`, transition: 'transform 0.15s ease-out' };
      };

      const letters = text.split('');
      return (
        <span ref={containerRef} className={`inline-flex cursor-default select-none ${className}`} style={{ fontSize: `${fontSize}px`, lineHeight: '1' }}>
          {letters.map((letter, index) => (
            <span key={index} ref={(el) => (letterRefs.current[index] = el)} className="inline-block font-anton origin-center" style={getLetterStyle(index)}>
              {letter === ' ' ? '\u00A0' : letter}
            </span>
          ))}
        </span>
      );
    }

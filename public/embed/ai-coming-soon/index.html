<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 交互界面 — Coming Soon</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#1A1A1A 0%,#2a1810 100%);color:#FFF;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden}
  .wrap{position:relative;padding:2rem}
  .ai-badge{display:inline-block;padding:.4rem 1rem;border:1px solid #FF3D00;color:#FF3D00;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.2em;margin-bottom:2rem}
  h1{font-size:clamp(3rem,12vw,8rem);font-weight:800;letter-spacing:-0.05em;line-height:.95;background:linear-gradient(135deg,#FF3D00,#FFA500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  p{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:#8A8A85;margin-top:2rem;letter-spacing:.05em}
  .pulse{position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,61,0,.15) 0%,transparent 60%);animation:pulse 4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.8;transform:scale(1.1)}}
</style>
</head>
<body>
<div class="pulse"></div>
<div class="wrap">
  <span class="ai-badge">04 / AI INTERFACE</span>
  <h1>COMING<br>SOON</h1>
  <p>AI 交互界面项目正在筹备中</p>
</div>
</body>
</html>
